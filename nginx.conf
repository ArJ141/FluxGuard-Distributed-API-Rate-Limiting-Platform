events {
    worker_connections 1024;
}

http {
    # Default nginx upstream behavior IS round-robin -- no directive
    # needed to enable it. This is exactly what lets us prove the
    # distributed correctness: consecutive requests for the same
    # client_id will hit different backend containers, and the rate
    # limit must still hold because the real state lives in Redis.
    upstream rate_limiter_backends {
        server api1:8000;
        server api2:8000;
        server api3:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://rate_limiter_backends;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
